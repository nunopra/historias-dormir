<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórias para Dormir</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #06101e;
      --card:         rgba(9, 19, 42, 0.90);
      --gold:         #f5c84c;
      --gold-dim:     rgba(245, 200, 76, 0.14);
      --gold-border:  rgba(245, 200, 76, 0.55);
      --lavender:     #a89fd4;
      --cloud:        #dde8f5;
      --muted:        #3a4e6b;
      --border:       rgba(255, 255, 255, 0.07);
      --border-hover: rgba(255, 255, 255, 0.18);
    }

    html, body {
      min-height: 100vh;
      background: linear-gradient(180deg, #050d1a 0%, #08142a 55%, #0c1535 100%);
      font-family: 'Nunito', sans-serif;
      color: var(--cloud);
      overflow-x: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 660px;
      margin: 0 auto;
      padding: 2.25rem 1.25rem 5rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .moon-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 0 14px rgba(245, 200, 76, 0.55));
      animation: moonFloat 4s ease-in-out infinite;
    }

    @keyframes moonFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    header h1 {
      font-size: 1.85rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--lavender);
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.75rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      margin-bottom: 1rem;
    }

    /* ── Group label ── */
    .group { margin-bottom: 1.6rem; }
    .group:last-child { margin-bottom: 0; }

    .group-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--lavender);
      margin-bottom: 0.7rem;
    }

    /* ── Option buttons ── */
    .options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .opt {
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid var(--border);
      border-radius: 0.8rem;
      padding: 0.65rem 0.35rem 0.55rem;
      cursor: pointer;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      color: var(--cloud);
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .opt:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border-hover);
    }

    .opt.selected {
      background: var(--gold-dim);
      border-color: var(--gold-border);
    }

    .opt:active { transform: scale(0.95); }

    .opt .em  { font-size: 1.6rem; display: block; line-height: 1; }
    .opt .lbl { font-size: 0.7rem; font-weight: 700; margin-top: 0.3rem; display: block; color: var(--cloud); }
    .opt.selected .lbl { color: var(--gold); }

    /* ── Nome input ── */
    .name-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid var(--border);
      border-radius: 0.65rem;
      padding: 0.6rem 0.9rem;
      color: var(--cloud);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .name-input::placeholder { color: var(--muted); }
    .name-input:focus { border-color: rgba(168, 159, 212, 0.45); }

    .hint {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--muted);
      text-transform: none;
      letter-spacing: 0;
      margin-left: 0.4rem;
    }

    /* ── Generate button ── */
    .btn-gerar {
      width: 100%;
      padding: 0.9rem;
      background: var(--gold);
      color: #1a0e00;
      border: none;
      border-radius: 0.9rem;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
      letter-spacing: 0.01em;
    }

    .btn-gerar:hover:not(:disabled) { background: #f9d86e; }
    .btn-gerar:active:not(:disabled) { transform: scale(0.98); }
    .btn-gerar:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Loading ── */
    .loading {
      display: none;
      text-align: center;
      padding: 3.5rem 1rem;
    }

    .loading-moon {
      font-size: 2.75rem;
      display: inline-block;
      animation: moonFloat 2s ease-in-out infinite;
    }

    .loading p {
      color: var(--lavender);
      margin-top: 0.85rem;
      font-size: 0.9rem;
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      background: rgba(220, 80, 80, 0.1);
      border: 1px solid rgba(220, 80, 80, 0.25);
      border-radius: 0.75rem;
      padding: 0.9rem 1rem;
      color: #ffaaaa;
      font-size: 0.875rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    /* ── Story card ── */
    .story-card {
      display: none;
      background: var(--card);
      border: 1px solid rgba(245, 200, 76, 0.15);
      border-radius: 1.25rem;
      padding: 1.85rem 1.75rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: fadeUp 0.7s ease forwards, breathe 4s ease-in-out 0.7s infinite;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 18px rgba(245, 200, 76, 0.06); }
      50%       { box-shadow: 0 0 36px rgba(245, 200, 76, 0.16); }
    }

    .story-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.3rem;
      gap: 1rem;
    }

    .story-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .btn-nova {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--lavender);
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-nova:hover {
      border-color: var(--lavender);
      color: var(--cloud);
    }

    .story-text {
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.9;
      color: var(--cloud);
      white-space: pre-wrap;
    }

    .story-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 1.3rem;
      opacity: 0.7;
    }

    /* ── Responsive ── */
    @media (max-width: 380px) {
      header h1    { font-size: 1.5rem; }
      .opt .em     { font-size: 1.35rem; }
      .opt .lbl    { font-size: 0.65rem; }
      .options     { gap: 0.35rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .moon-icon, .loading-moon, .story-card { animation: none; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="wrapper">

  <header>
    <span class="moon-icon">🌙</span>
    <h1>Histórias para Dormir</h1>
    <p>Escolhe os ingredientes e a magia acontece</p>
  </header>

  <div id="errorMsg" class="error-msg"></div>

  <div class="card" id="formCard">

    <div class="group">
      <div class="group-label">Personagem</div>
      <div class="options" data-group="personagem">
        <button class="opt" data-value="uma Princesa">
          <span class="em">👸</span><span class="lbl">Princesa</span>
        </button>
        <button class="opt" data-value="um Cavaleiro">
          <span class="em">⚔️</span><span class="lbl">Cavaleiro</span>
        </button>
        <button class="opt" data-value="uma Fada">
          <span class="em">🧚</span><span class="lbl">Fada</span>
        </button>
        <button class="opt" data-value="um Pirata">
          <span class="em">🏴‍☠️</span><span class="lbl">Pirata</span>
        </button>
        <button class="opt" data-value="um Astronauta">
          <span class="em">🚀</span><span class="lbl">Astronauta</span>
        </button>
        <button class="opt" data-value="um Feiticeiro">
          <span class="em">🧙</span><span class="lbl">Feiticeiro</span>
        </button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">Animal Amigo</div>
      <div class="options" data-group="animal">
        <button class="opt" data-value="um Leãozinho">
          <span class="em">🦁</span><span class="lbl">Leãozinho</span>
        </button>
        <button class="opt" data-value="um Unicórnio">
          <span class="em">🦄</span><span class="lbl">Unicórnio</span>
        </button>
        <button class="opt" data-value="um Coelhinho">
          <span class="em">🐰</span><span class="lbl">Coelhinho</span>
        </button>
        <button class="opt" data-value="um Elefante">
          <span class="em">🐘</span><span class="lbl">Elefante</span>
        </button>
        <button class="opt" data-value="uma Borboleta Mágica">
          <span class="em">🦋</span><span class="lbl">Borboleta</span>
        </button>
        <button class="opt" data-value="um Dragãozinho">
          <span class="em">🐉</span><span class="lbl">Dragãozinho</span>
        </button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">Cenário</div>
      <div class="options" data-group="cenario">
        <button class="opt" data-value="numa Floresta Encantada">
          <span class="em">🌲</span><span class="lbl">Floresta</span>
        </button>
        <button class="opt" data-value="num Castelo nas Nuvens">
          <span class="em">☁️</span><span class="lbl">Castelo</span>
        </button>
        <button class="opt" data-value="no Fundo do Mar">
          <span class="em">🌊</span><span class="lbl">Mar</span>
        </button>
        <button class="opt" data-value="numa Galáxia Estrelada">
          <span class="em">⭐</span><span class="lbl">Galáxia</span>
        </button>
        <button class="opt" data-value="numa Montanha Nevada">
          <span class="em">🏔️</span><span class="lbl">Montanha</span>
        </button>
        <button class="opt" data-value="num Jardim Secreto">
          <span class="em">🌸</span><span class="lbl">Jardim</span>
        </button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">
        Nome da Criança
        <span class="hint">(opcional)</span>
      </div>
      <input
        type="text"
        class="name-input"
        id="nomeInput"
        placeholder="ex: Sofia, João…"
        maxlength="30"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
    </div>

    <button class="btn-gerar" id="btnGerar" disabled>
      ✨ Gerar História
    </button>

  </div>

  <div class="loading" id="loadingState">
    <span class="loading-moon">🌙</span>
    <p>A tecer a tua história mágica…</p>
  </div>

  <div class="story-card" id="storyCard">
    <div class="story-header">
      <span class="story-label">✨ A tua história</span>
      <button class="btn-nova" id="btnNova">↺ Nova história</button>
    </div>
    <div class="story-text" id="storyText"></div>
    <div class="story-footer">🌙 &nbsp; ⭐ &nbsp; 🌙</div>
  </div>

</div>

<script>
  /* ── Stars ─────────────────────────────────────────── */
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');
  let   stars  = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function makeStars(n) {
    stars = Array.from({ length: n }, () => ({
      x:     Math.random() * canvas.width,
      y:     Math.random() * canvas.height,
      r:     Math.random() * 1.15 + 0.25,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.45 + 0.1
    }));
  }

  let t0 = null;
  function draw(ts) {
    if (!t0) t0 = ts;
    const t = (ts - t0) * 0.001;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const a = 0.2 + 0.8 * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,248,230,${a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  resize();
  makeStars(170);
  requestAnimationFrame(draw);
  window.addEventListener('resize', () => { resize(); makeStars(170); });

  /* ── Selections ─────────────────────────────────────── */
  const sel     = { personagem: null, animal: null, cenario: null };
  const btnGerar   = document.getElementById('btnGerar');
  const btnNova    = document.getElementById('btnNova');
  const nomeInput  = document.getElementById('nomeInput');
  const formCard   = document.getElementById('formCard');
  const loadingState = document.getElementById('loadingState');
  const storyCard  = document.getElementById('storyCard');
  const storyText  = document.getElementById('storyText');
  const errorMsg   = document.getElementById('errorMsg');

  document.querySelectorAll('.options').forEach(group => {
    const g = group.dataset.group;
    group.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        sel[g] = btn.dataset.value;
        btnGerar.disabled = !(sel.personagem && sel.animal && sel.cenario);
      });
    });
  });

  /* ── Generate ───────────────────────────────────────── */
  btnGerar.addEventListener('click', async () => {
    const nome = nomeInput.value.trim();

    errorMsg.style.display  = 'none';
    formCard.style.display   = 'none';
    storyCard.style.display  = 'none';
    loadingState.style.display = 'block';

    try {
      const res  = await fetch('/api/story', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          personagem: sel.personagem,
          animal:     sel.animal,
          cenario:    sel.cenario,
          nome:       nome || null
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro desconhecido');

      storyText.textContent      = data.story;
      loadingState.style.display = 'none';
      storyCard.style.display    = 'block';
      storyCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      loadingState.style.display = 'none';
      formCard.style.display     = 'block';
      errorMsg.textContent       = err.message;
      errorMsg.style.display     = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  /* ── Reset ──────────────────────────────────────────── */
  btnNova.addEventListener('click', () => {
    storyCard.style.display = 'none';
    formCard.style.display  = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>

</body>
</html>
